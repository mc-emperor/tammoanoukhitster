<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Tammo & Anouk — Hitster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

    <!-- Login -->
    <div id="screen-login" class="screen">
        <div class="center-content">
            <p class="kicker">welkom bij</p>
            <h1 class="logo">Tammo <span class="amp">&</span> Anouk</h1>
            <p class="subtitle">Hitster</p>
            <button class="btn-primary" onclick="login()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                Inloggen met Spotify
            </button>
        </div>
        <div class="flowers-strip"></div>
    </div>

    <!-- Loading -->
    <div id="screen-loading" class="screen">
        <div class="center-content">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Ready -->
    <div id="screen-ready" class="screen">
        <div class="center-content">
            <h1 class="logo">Tammo <span class="amp">&</span> Anouk</h1>
            <p class="ready-hint">Open Spotify op je telefoon<br>en speel even een liedje af</p>
            <button class="btn-primary" onclick="onStart()">We gaan! 🎵</button>
            <button class="btn-ghost" onclick="logout(); location.reload()">Uitloggen</button>
        </div>
        <div class="flowers-strip"></div>
    </div>

    <!-- Scanner -->
    <div id="screen-scanner" class="screen">
        <div id="scanner-container"></div>
        <div class="scanner-hud">
            <button class="hud-btn" onclick="cycleTimer()" title="Tijdsduur aanpassen">
                <span id="timer-label">30s</span>
            </button>
            <button class="hud-btn" onclick="logout(); location.reload()">⏏</button>
        </div>
    </div>

    <!-- Playing -->
    <div id="screen-playing" class="screen playing-screen">
        <div class="center-content">
            <div class="ring-wrapper">
                <svg class="countdown-svg" viewBox="0 0 100 100">
                    <circle class="ring-bg" cx="50" cy="50" r="45"/>
                    <circle id="countdown-ring" class="ring-fg" cx="50" cy="50" r="45"/>
                </svg>
                <span id="countdown-text">30</span>
            </div>
            <button class="btn-stop" onclick="onStop()">Stop</button>
        </div>
    </div>

    <!-- Error -->
    <div id="screen-error" class="screen">
        <div class="center-content">
            <div class="error-icon">🌸</div>
            <p id="error-message">Er ging iets mis</p>
            <button class="btn-primary" onclick="showScreen('scanner'); resumeScanner()">Opnieuw</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/player.js?v=3"></script>
    <script src="js/scanner.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
